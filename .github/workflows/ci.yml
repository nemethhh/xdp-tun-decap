name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        whitelist: [0, 1]
        stats: [0, 1]

    name: "build-and-test (WHITELIST=${{ matrix.whitelist }}, STATS=${{ matrix.stats }})"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment for act
        run: |
          # Install sudo if not present (for act/Docker environments)
          if ! command -v sudo &> /dev/null; then
            apt-get update && apt-get install -y sudo
          fi

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm \
            gcc \
            libelf-dev \
            libbpf-dev \
            linux-headers-generic \
            pkg-config \
            git \
            make \
            libz-dev \
            file \
            binutils-dev \
            libcap-dev

      - name: Build and install bpftool and libbpf
        run: |
          cd /tmp
          git clone --depth 1 --recurse-submodules --shallow-submodules \
            --branch v7.6.0 https://github.com/libbpf/bpftool.git

          # Build and install libbpf first
          cd bpftool/libbpf/src
          make -j$(nproc)
          sudo BUILD_STATIC_ONLY=y make install
          sudo ldconfig

          # Build and install bpftool
          cd /tmp/bpftool/src
          make -j$(nproc)
          sudo make install

          # Verify installations
          bpftool version
          pkg-config --modversion libbpf

      - name: Mount BPF filesystem
        run: |
          if ! mount | grep -q "bpf on /sys/fs/bpf"; then
            sudo mkdir -p /sys/fs/bpf
            sudo mount -t bpf bpf /sys/fs/bpf
          fi
          mount | grep bpf

      - name: "Build BPF program (WHITELIST=${{ matrix.whitelist }}, STATS=${{ matrix.stats }})"
        run: |
          make all WHITELIST=${{ matrix.whitelist }} STATS=${{ matrix.stats }}
          ls -lh build/
          file build/tun_decap.bpf.o

      - name: Upload build artifacts
        if: github.actor != 'nektos/act'
        uses: actions/upload-artifact@v4
        with:
          name: xdp-tun-decap-wl${{ matrix.whitelist }}-stats${{ matrix.stats }}-${{ github.sha }}
          path: |
            build/tun_decap.bpf.o
            build/tun_decap.skel.h
          retention-days: 30

      - name: Local build summary
        if: github.actor == 'nektos/act'
        run: |
          echo "=== Local Build Complete (WHITELIST=${{ matrix.whitelist }}, STATS=${{ matrix.stats }}) ==="
          echo ""
          echo "Build artifacts:"
          ls -lh build/
          echo ""
          echo "Note: Artifact upload skipped (running with act)"

      - name: "Run integration tests (WHITELIST=${{ matrix.whitelist }}, STATS=${{ matrix.stats }})"
        if: github.actor != 'nektos/act'
        run: |
          cd tests
          chmod +x ./run-tests.sh ./run-integration-tests.sh
          sudo ./run-tests.sh

      - name: Skip integration tests (act)
        if: github.actor == 'nektos/act'
        run: |
          echo "=== Integration Tests Skipped (WHITELIST=${{ matrix.whitelist }}, STATS=${{ matrix.stats }}) ==="
          echo ""
          echo "Integration tests require Docker-in-Docker and are skipped when running with act."
          echo "These tests will run on GitHub Actions."
          echo ""
          echo "To run integration tests locally outside of act:"
          echo "  cd tests && ./run-tests.sh"

  lint:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment for act
        run: |
          # Install sudo if not present (for act/Docker environments)
          if ! command -v sudo &> /dev/null; then
            apt-get update && apt-get install -y sudo
          fi

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check C code formatting
        run: |
          if [ ! -f .clang-format ]; then
            echo "No .clang-format found, using default style"
          fi

          find src -name "*.c" -o -name "*.h" | while read file; do
            if ! clang-format --dry-run --Werror "$file" 2>/dev/null; then
              echo "::warning file=$file::File may need formatting"
            fi
          done || true

      - name: Check for common BPF issues
        run: |
          echo "=== Checking for common BPF issues ==="

          # Check for unbounded loops
          if grep -r "while.*{" src/bpf/*.c | grep -v "bounded"; then
            echo "::warning::Found potential unbounded loops - verify they are bounded"
          fi

          # Check for large stack allocations
          if grep -r "char.*\[.*\]" src/bpf/*.c | grep -E "\[[0-9]{3,}\]"; then
            echo "::warning::Found large stack allocations - BPF stack is limited to 512 bytes"
          fi

          echo "✓ Basic checks complete"
