name: Release

on:
  push:
    tags:
      - "v*.*.*" # Trigger on semantic version tags (e.g., v1.0.0, v2.1.3)
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v1.0.0)"
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        whitelist: [0, 1]
        stats: [0, 1]

    name: "Build (WHITELIST=${{ matrix.whitelist }}, STATS=${{ matrix.stats }})"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment for act
        run: |
          # Install sudo if not present (for act/Docker environments)
          if ! command -v sudo &> /dev/null; then
            apt-get update && apt-get install -y sudo
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            llvm \
            libelf-dev \
            libz-dev \
            libbpf-dev \
            linux-headers-generic \
            build-essential \
            pkg-config \
            git \
            file \
            binutils-dev \
            libcap-dev

      - name: Build and install bpftool and libbpf from source
        run: |
          # Clone bpftool repository with submodules (includes libbpf)
          cd /tmp
          git clone --depth 1 --recurse-submodules --shallow-submodules \
            --branch v7.6.0 https://github.com/libbpf/bpftool.git

          # Build and install libbpf first (needed for newer APIs)
          cd bpftool/libbpf/src
          make -j$(nproc)
          sudo BUILD_STATIC_ONLY=y make install
          sudo ldconfig

          # Build and install bpftool
          cd /tmp/bpftool/src
          make -j$(nproc)
          sudo make install

          # Verify installations
          bpftool version
          pkg-config --modversion libbpf

      - name: Install libxdp
        run: |
          sudo apt-get install -y libxdp-dev || echo "libxdp not available"

      - name: Generate vmlinux.h
        run: |
          if [ -f /sys/kernel/btf/vmlinux ]; then
            make vmlinux
          else
            echo "Creating placeholder vmlinux.h for CI build"
            cat > src/bpf/vmlinux.h << 'VMLINUX_EOF'
          /* Minimal vmlinux.h for CI build */
          #ifndef __VMLINUX_H__
          #define __VMLINUX_H__
          typedef unsigned char __u8;
          typedef unsigned short __u16;
          typedef unsigned int __u32;
          typedef unsigned long long __u64;
          #endif
          VMLINUX_EOF
          fi

      - name: "Build BPF program (WHITELIST=${{ matrix.whitelist }}, STATS=${{ matrix.stats }})"
        run: |
          make all WHITELIST=${{ matrix.whitelist }} STATS=${{ matrix.stats }}

          VARIANT="wl${{ matrix.whitelist }}-stats${{ matrix.stats }}"
          cp build/tun_decap.bpf.o "build/tun_decap-${VARIANT}.bpf.o"
          cp build/tun_decap.skel.h "build/tun_decap-${VARIANT}.skel.h"

          echo "Built variant: ${VARIANT}"
          ls -lh build/tun_decap-${VARIANT}.*
          file "build/tun_decap-${VARIANT}.bpf.o"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: "build-wl${{ matrix.whitelist }}-stats${{ matrix.stats }}"
          path: |
            build/tun_decap-wl${{ matrix.whitelist }}-stats${{ matrix.stats }}.bpf.o
            build/tun_decap-wl${{ matrix.whitelist }}-stats${{ matrix.stats }}.skel.h
          retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write # Required for creating releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for changelog

      - name: Set version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_number=${VERSION#v}" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "build-*"

      - name: Create release package
        run: |
          VERSION=${{ steps.version.outputs.version }}
          PKG_NAME="xdp-tun-decap-${VERSION}"

          # Create release directory
          mkdir -p release/${PKG_NAME}

          # Collect all variant binaries
          mkdir -p release/${PKG_NAME}/bin
          for dir in artifacts/build-*; do
            cp "${dir}"/*.bpf.o release/${PKG_NAME}/bin/
            cp "${dir}"/*.skel.h release/${PKG_NAME}/bin/
          done

          # Copy documentation
          cp README.md release/${PKG_NAME}/
          cp CLAUDE.md release/${PKG_NAME}/
          cp Makefile release/${PKG_NAME}/

          # Copy source files
          mkdir -p release/${PKG_NAME}/src
          cp -r src/* release/${PKG_NAME}/src/

          echo "=== Release package contents ==="
          find release/${PKG_NAME}/bin -type f | sort
          echo ""

          # Create tarball
          cd release
          tar czf ${PKG_NAME}.tar.gz ${PKG_NAME}
          cd ..

          # Create checksums for all artifacts
          cd release
          sha256sum ${PKG_NAME}.tar.gz > ${PKG_NAME}.tar.gz.sha256
          for f in ${PKG_NAME}/bin/*.bpf.o; do
            name=$(basename "$f")
            sha256sum "$f" > "${name}.sha256"
          done
          cd ..

          # Copy individual BPF objects to release root for direct download
          cp release/${PKG_NAME}/bin/*.bpf.o release/
          cp release/${PKG_NAME}/bin/*.skel.h release/

          echo "=== Release artifacts ==="
          ls -lh release/*.tar.gz release/*.bpf.o release/*.sha256

      - name: Generate changelog
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.version }}

          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            echo "Generating changelog from $PREV_TAG to $VERSION"
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" $PREV_TAG..HEAD)
          else
            echo "No previous tag found, showing recent commits"
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" -n 20)
          fi

          # Save changelog to file
          cat > release_notes.md << EOF
          ## XDP Tunnel Decapsulation Program $VERSION

          ### Changes
          $CHANGELOG

          ### Build Variants

          Each release includes pre-built BPF objects for all compile-time flag combinations:

          | File | WHITELIST | STATS | Description |
          |------|:---------:|:-----:|-------------|
          | \`tun_decap-wl1-stats0.bpf.o\` | 1 | 0 | Whitelist enabled, stats disabled |
          | \`tun_decap-wl1-stats1.bpf.o\` | 1 | 1 | Whitelist enabled, stats enabled |
          | \`tun_decap-wl0-stats0.bpf.o\` | 0 | 0 | No whitelist, no stats (max performance) |
          | \`tun_decap-wl0-stats1.bpf.o\` | 0 | 1 | No whitelist, stats enabled |

          ### Features
          - High-performance GRE and IPIP tunnel decapsulation using XDP
          - Full IPv6 support (inner and outer headers)
          - Per-CPU hash maps for lock-free whitelist lookups
          - Separate IPv4 and IPv6 whitelist maps
          - Comprehensive statistics tracking
          - Runtime configuration for disabling features

          ### Requirements
          - Linux kernel 5.17+ with CONFIG_DEBUG_INFO_BTF=y
          - XDP-capable network interface
          - clang/LLVM with BPF support
          - libbpf, bpftool

          ### Installation
          \`\`\`bash
          # Extract release
          tar xzf xdp-tun-decap-${VERSION}.tar.gz
          cd xdp-tun-decap-${VERSION}

          # Build from source (recommended for target kernel)
          make all

          # Or use pre-built binary (if kernel-compatible)
          # Whitelist enabled, no stats (default):
          sudo xdp-loader load -m native eth0 bin/tun_decap-wl1-stats0.bpf.o

          # Max performance (no whitelist, no stats):
          sudo xdp-loader load -m native eth0 bin/tun_decap-wl0-stats0.bpf.o

          # Full observability (whitelist + stats):
          sudo xdp-loader load -m native eth0 bin/tun_decap-wl1-stats1.bpf.o
          \`\`\`

          ### Checksums
          See \`.sha256\` files for artifact checksums.

          ### Documentation
          - [README.md](README.md) - User documentation
          - [CLAUDE.md](CLAUDE.md) - Developer documentation
          EOF

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat release_notes.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.actor != 'nektos/act'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            release/xdp-tun-decap-${{ steps.version.outputs.version }}.tar.gz
            release/xdp-tun-decap-${{ steps.version.outputs.version }}.tar.gz.sha256
            release/tun_decap-wl1-stats0.bpf.o
            release/tun_decap-wl1-stats0.bpf.o.sha256
            release/tun_decap-wl1-stats1.bpf.o
            release/tun_decap-wl1-stats1.bpf.o.sha256
            release/tun_decap-wl0-stats0.bpf.o
            release/tun_decap-wl0-stats0.bpf.o.sha256
            release/tun_decap-wl0-stats1.bpf.o
            release/tun_decap-wl0-stats1.bpf.o.sha256
            release/tun_decap-wl1-stats0.skel.h
            release/tun_decap-wl1-stats1.skel.h
            release/tun_decap-wl0-stats0.skel.h
            release/tun_decap-wl0-stats1.skel.h
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release artifacts
        if: github.actor != 'nektos/act'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ steps.version.outputs.version }}
          path: |
            release/xdp-tun-decap-${{ steps.version.outputs.version }}.tar.gz
            release/*.sha256
            release/*.bpf.o
            release/*.skel.h
          retention-days: 90

      - name: Local release summary
        if: github.actor == 'nektos/act'
        run: |
          echo "=== Local Build Complete ==="
          echo ""
          echo "Release artifacts created in ./release/"
          ls -lh release/*.tar.gz release/*.bpf.o release/*.sha256 2>/dev/null || true
          echo ""
          echo "Build variants:"
          ls -lh release/tun_decap*.bpf.o 2>/dev/null || true
          echo ""
          echo "Note: GitHub release creation skipped (running with act)"
